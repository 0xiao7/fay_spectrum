<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Fay's Spectrum — 備考練習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f6f4f0; --surface:#ede9e2; --card:#faf8f5;
  --blue:#a1c7f6; --blue-m:#7aa8d4; --blue-d:#4a7aaa; --blue-l:#daeeff;
  --teal:#a0d1ca; --teal-m:#5fa8a0; --teal-l:#dcf2f0;
  --rose:#f8bcb5; --rose-m:#e88c84; --rose-l:#fde8e6;
  --purple:#cab3c7; --purple-m:#9d7898; --purple-l:#eedde9;
  --sage:#c6deb4; --sage-m:#89b870; --sage-l:#eaf4e2;
  --amber:#f8e0b8; --amber-m:#d4a865; --amber-l:#fdf3e3;
  --text:#3a3530; --muted:#7a726a; --hint:#aaa098;
  --border:rgba(58,53,48,.09); --borderM:rgba(58,53,48,.18);
  --r:9px; --rl:14px; --shadow:0 2px 14px rgba(58,53,48,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;}

.shell{display:flex;height:100dvh;overflow:hidden;}

/* sidebar */
.sidebar{
  width:210px;flex-shrink:0;background:var(--card);
  border-right:0.5px solid var(--border);
  display:flex;flex-direction:column;padding:1.4rem 1rem;
  transition:transform .3s ease;z-index:100;
}
.logo h1{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:400;letter-spacing:.04em;}
.logo p{font-size:10px;color:var(--hint);letter-spacing:.08em;margin-top:3px;margin-bottom:1.5rem;}
.nav{display:flex;flex-direction:column;gap:2px;flex:1;}
.ni{
  display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r);
  cursor:pointer;font-size:13px;color:var(--muted);border:none;background:transparent;
  text-align:left;width:100%;transition:all .15s;font-family:'DM Sans',sans-serif;
}
.ni:hover{background:var(--surface);color:var(--text);}
.ni.on{background:var(--blue-l);color:var(--text);font-weight:500;}
.ni-ic{font-size:13px;width:16px;text-align:center;}
.sf{border-top:0.5px solid var(--border);padding-top:.9rem;margin-top:.9rem;}
.streak{display:flex;align-items:center;gap:6px;background:var(--amber-l);border-radius:99px;padding:5px 11px;font-size:11px;color:#8a6020;font-weight:500;border:0.5px solid var(--amber);}
.exam-cd{margin-top:.75rem;text-align:center;}
.cd-n{font-family:'Noto Serif TC',serif;font-size:32px;font-weight:300;color:var(--blue-d);}
.cd-l{font-size:10px;color:var(--hint);letter-spacing:.06em;}

.hbg{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);width:36px;height:36px;align-items:center;justify-content:center;cursor:pointer;font-size:15px;box-shadow:var(--shadow);}
@media(max-width:680px){
  .hbg{display:flex;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:150;}
  .sidebar.open{transform:translateX(0);box-shadow:6px 0 24px rgba(0,0,0,.1);}
  .main{padding:1rem!important;}
  .mx{grid-template-columns:repeat(2,1fr)!important;}
  .two-col{grid-template-columns:1fr!important;}
}
.mask{display:none;position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.2);}
.mask.show{display:block;}

.main{flex:1;overflow-y:auto;padding:2rem 1.75rem;}
.pg-title{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:300;margin-bottom:1.5rem;letter-spacing:.03em;}
.pane{display:none;} .pane.on{display:block;}
.card{background:var(--card);border-radius:var(--rl);border:0.5px solid var(--border);padding:1.2rem 1.4rem;margin-bottom:.9rem;box-shadow:var(--shadow);}
.sec{font-size:10px;letter-spacing:.08em;color:var(--hint);text-transform:uppercase;font-weight:500;margin-bottom:11px;}

.mx{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:.9rem;}
.m{background:var(--surface);border-radius:var(--r);padding:.85rem 1rem;}
.ml{font-size:10px;color:var(--hint);letter-spacing:.04em;margin-bottom:3px;}
.mv{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:300;}
.mv.b{color:var(--blue-d);} .mv.t{color:var(--teal-m);} .mv.r{color:var(--rose-m);} .mv.s{color:var(--sage-m);}
.mu{font-size:10px;color:var(--hint);margin-top:1px;}

.br{margin-bottom:10px;}
.bl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.bl span{color:var(--muted);font-size:11px;}
.bt{height:4px;background:var(--surface);border-radius:99px;overflow:hidden;}
.bf{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.22,1,.36,1);}

.mini-chart{display:flex;align-items:flex-end;height:60px;gap:4px;}
.mb{flex:1;border-radius:3px 3px 0 0;min-height:3px;}
.cl{display:flex;justify-content:space-between;margin-top:3px;}
.cl span{font-size:9px;color:var(--hint);}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem;}
.two-col .card{margin-bottom:0;}

/* typing */
.lang-toggle{display:flex;background:var(--surface);border-radius:99px;padding:3px;gap:2px;width:fit-content;margin-bottom:10px;}
.lt{padding:5px 14px;border-radius:99px;border:none;background:transparent;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all .2s;}
.lt.on{background:var(--card);color:var(--text);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.08);}

.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.pill{padding:5px 13px;border-radius:99px;border:0.5px solid var(--borderM);background:transparent;cursor:pointer;font-size:11px;color:var(--muted);transition:all .15s;font-family:'DM Sans',sans-serif;}
.pill.on{background:var(--blue-l);border-color:var(--blue-m);color:var(--text);}
.pill:hover:not(.on){background:var(--surface);color:var(--text);}

.timer-wrap{display:flex;align-items:center;gap:7px;}
.timer-num{font-size:13px;font-weight:500;color:var(--blue-d);}
.timer-num.hot{color:var(--rose-m);}

.ty-disp{background:var(--surface);border-radius:var(--r);padding:1rem 1.25rem;min-height:70px;font-size:18px;line-height:1.95;letter-spacing:.03em;font-family:'Noto Serif TC',serif;margin-bottom:.75rem;word-break:break-word;}
.cc{color:var(--sage-m);}
.cw{color:var(--rose-m);text-decoration:underline;text-decoration-color:rgba(232,140,132,.4);}
.cur{background:var(--blue-l);border-radius:2px;animation:bl .75s infinite;}
.cp{color:var(--hint);}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.15}}

.ty-in{width:100%;border:0.5px solid var(--borderM);background:var(--card);border-radius:var(--r);padding:11px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;resize:none;height:46px;-webkit-appearance:none;transition:border-color .2s;ime-mode:auto;}
.ty-in:focus{border-color:var(--blue-m);}
.ty-in:disabled{opacity:.5;pointer-events:none;}

.ty-stats{display:flex;gap:14px;margin-top:10px;align-items:center;flex-wrap:wrap;}
.ty-stats span{font-size:12px;}
.ty-stats strong{font-weight:500;}

.result{background:var(--teal-l);border:0.5px solid var(--teal);border-radius:var(--r);padding:.9rem 1.2rem;display:none;margin-bottom:.75rem;}
.result.show{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.rw{font-family:'Noto Serif TC',serif;font-size:28px;font-weight:300;color:var(--text);}
.rs{font-size:11px;color:var(--muted);margin-top:3px;}

.ac{background:var(--surface);border-radius:var(--r);padding:.75rem 1rem;margin-bottom:6px;cursor:pointer;border:0.5px solid transparent;transition:all .15s;}
.ac:hover{background:var(--blue-l);border-color:var(--border);}
.ac.sel{background:var(--blue-l);border-color:var(--blue-m);}
.ac-no{font-size:10px;color:var(--muted);margin-bottom:2px;}
.ac-ti{font-size:13px;font-weight:500;}
.ac-en{font-size:11px;color:var(--hint);margin-top:2px;}
.stars{color:var(--rose-m);font-size:10px;}

/* category tabs */
.cat-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.cat-tab{padding:4px 12px;border-radius:99px;border:0.5px solid var(--borderM);background:transparent;cursor:pointer;font-size:11px;color:var(--muted);transition:all .15s;font-family:'DM Sans',sans-serif;}
.cat-tab.on{background:var(--teal-l);border-color:var(--teal-m);color:var(--text);}

.wl{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.wl:last-child{border-bottom:none;}
.wl-n{flex:1;}
.wl-b{flex:2;height:4px;background:var(--surface);border-radius:99px;overflow:hidden;}
.wl-f{height:100%;background:var(--rose-m);border-radius:99px;}
.wl-p{font-size:11px;color:var(--muted);min-width:28px;text-align:right;}

.btn{padding:7px 16px;border-radius:var(--r);border:0.5px solid var(--borderM);background:transparent;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text);transition:all .15s;}
.btn:hover{background:var(--surface);}
.btn-blue{background:var(--blue);border-color:var(--blue-m);color:var(--text);}
.btn-teal{background:var(--teal);border-color:var(--teal-m);color:var(--text);}
.btn-rose{background:var(--rose);border-color:var(--rose-m);color:var(--text);}
.btn-sm{padding:5px 11px;font-size:11px;}

.toast{position:fixed;bottom:20px;right:20px;background:var(--teal-m);color:#fff;border-radius:var(--r);padding:10px 16px;font-size:12px;display:none;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.toast.show{display:block;}

.tag{font-size:10px;font-family:'DM Sans',sans-serif;padding:2px 7px;border-radius:4px;background:var(--surface);color:var(--muted);}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.divider{height:0.5px;background:var(--border);margin:.75rem 0;}

/* principle cards */
.pc{background:var(--surface);border-radius:var(--r);padding:.9rem 1rem;margin-bottom:8px;border-left:3px solid var(--blue-m);}
.pc.teal{border-left-color:var(--teal-m);}
.pc.rose{border-left-color:var(--rose-m);}
.pc.sage{border-left-color:var(--sage-m);}
.pc.purple{border-left-color:var(--purple-m);}
.pc.amber{border-left-color:var(--amber-m);}
.pc-en{font-size:13px;font-weight:500;margin-bottom:3px;}
.pc-zh{font-size:12px;color:var(--muted);margin-bottom:4px;}
.pc-desc{font-size:11px;color:var(--hint);line-height:1.6;}
.pc-exam{font-size:10px;background:var(--rose-l);color:var(--rose-m);border-radius:4px;padding:2px 7px;display:inline-block;margin-top:4px;}
</style>
</head>
<body>
<button class="hbg" onclick="toggleSidebar()">☰</button>
<div class="mask" id="mask" onclick="toggleSidebar()"></div>

<div class="shell">
<nav class="sidebar" id="sidebar">
  <div class="logo">
    <h1>Fay's Spectrum</h1>
    <p>2026 記帳士備考練習</p>
  </div>
  <div class="nav">
    <button class="ni on" onclick="sw('dash',this)"><span class="ni-ic">◈</span>儀表板</button>
    <button class="ni" onclick="sw('typing',this)"><span class="ni-ic">◎</span>打字練習</button>
    <button class="ni" onclick="sw('principles',this)"><span class="ni-ic">◇</span>會計原理原則</button>
    <button class="ni" onclick="sw('weak',this)"><span class="ni-ic">◉</span>弱點分析</button>
  </div>
  <div class="sf">
    <div class="streak">🔥 連讀 <span id="streakN">0</span> 天</div>
    <div class="exam-cd">
      <div class="cd-n" id="sideCD">—</div>
      <div class="cd-l">天後考試</div>
    </div>
  </div>
</nav>

<main class="main">

<!-- 儀表板 -->
<div class="pane on" id="pane-dash">
  <div class="pg-title">今日概況</div>
  <div class="mx">
    <div class="m"><div class="ml">考試倒數</div><div class="mv b" id="d-days">—</div><div class="mu">天</div></div>
    <div class="m"><div class="ml">今日練習</div><div class="mv t" id="d-today">0</div><div class="mu">輪</div></div>
    <div class="m"><div class="ml">累計條次</div><div class="mv r" id="d-total">0</div><div class="mu">次</div></div>
    <div class="m"><div class="ml">最佳 WPM</div><div class="mv s" id="d-wpm">—</div><div class="mu">wpm</div></div>
  </div>

  <div class="card">
    <div class="sec">科目權重</div>
    <div class="br"><div class="bl"><strong>會計學概要</strong><span>35%</span></div><div class="bt"><div class="bf" style="width:35%;background:var(--blue-m)"></div></div></div>
    <div class="br"><div class="bl"><strong>稅務相關法規</strong><span>30%</span></div><div class="bt"><div class="bf" style="width:30%;background:var(--purple-m)"></div></div></div>
    <div class="br"><div class="bl"><strong>租稅申報實務</strong><span>25%</span></div><div class="bt"><div class="bf" style="width:25%;background:var(--rose-m)"></div></div></div>
    <div class="br" style="margin:0"><div class="bl"><strong>記帳相關法規</strong><span>10%</span></div><div class="bt"><div class="bf" style="width:10%;background:var(--sage-m)"></div></div></div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="sec">WPM 成長</div>
      <div class="mini-chart" id="wpmChart"></div>
      <div class="cl"><span>最早</span><span>最近</span></div>
    </div>
    <div class="card">
      <div class="sec">每日練習輪數</div>
      <div class="mini-chart" id="dailyChart"></div>
      <div class="cl"><span>7天前</span><span>今天</span></div>
    </div>
  </div>
</div>

<!-- 打字練習 -->
<div class="pane" id="pane-typing">
  <div class="pg-title">打字練習</div>
  <div class="card">
    <div class="flex" style="justify-content:space-between;margin-bottom:10px;">
      <div class="lang-toggle">
        <button class="lt on" id="ltEN" onclick="setLang('en',this)">English</button>
        <button class="lt" id="ltZH" onclick="setLang('zh',this)">中文</button>
      </div>
      <div class="timer-wrap">
        <svg width="30" height="30" viewBox="0 0 30 30" style="transform:rotate(-90deg)">
          <circle cx="15" cy="15" r="12" fill="none" stroke="var(--surface)" stroke-width="3"/>
          <circle cx="15" cy="15" r="12" fill="none" stroke="var(--blue-m)" stroke-width="3" stroke-dasharray="75" stroke-dashoffset="0" id="timerArc" style="transition:stroke-dashoffset .5s linear;"/>
        </svg>
        <span class="timer-num" id="timerNum">60</span>
        <button class="btn btn-sm" id="timerBtn" onclick="toggleTimer()">計時模式</button>
      </div>
    </div>

    <div class="pills" id="modePills">
      <button class="pill on" onclick="selMode(this,'law_en')">法條關鍵字</button>
      <button class="pill" onclick="selMode(this,'acc_en')">會計英文</button>
      <button class="pill" onclick="selMode(this,'tax_en')">稅法英文</button>
      <button class="pill" onclick="selMode(this,'star5_en')">★★★★★ 抽題</button>
      <button class="pill" onclick="selMode(this,'acc_zh')">會計中文</button>
      <button class="pill" onclick="selMode(this,'law_zh')">法條中文</button>
      <button class="pill" onclick="selMode(this,'custom')">自訂</button>
    </div>

    <div class="result" id="resultBox">
      <div><div class="rw" id="rWpm">0 WPM</div><div class="rs" id="rAcc">準確率 100%</div></div>
      <div style="flex:1"></div>
      <div style="text-align:right"><div style="font-size:10px;color:var(--hint)">最佳紀錄</div><div style="font-family:'Noto Serif TC',serif;font-size:20px;font-weight:300;color:var(--blue-d)" id="rBest">—</div></div>
    </div>

    <div class="ty-disp" id="tyDisp"></div>
    <textarea class="ty-in" id="tyIn" placeholder="點此開始打字…" oninput="onInput()" onkeydown="onKD(event)" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="none"></textarea>

    <div class="ty-stats">
      <span>速度 <strong id="stWpm" style="color:var(--blue-d)">0</strong> WPM</span>
      <span>準確 <strong id="stAcc" style="color:var(--sage-m)">100</strong>%</span>
      <span>進度 <strong id="stProg" style="color:var(--purple-m)">0/0</strong></span>
      <div style="flex:1"></div>
      <button class="btn btn-sm" onclick="nextText()">換題</button>
      <button class="btn btn-blue btn-sm" onclick="resetTy()">重置</button>
    </div>
  </div>

  <div class="card">
    <div class="sec">法條速查（點選即練）</div>
    <div id="artList"></div>
  </div>
</div>

<!-- 會計原理原則 -->
<div class="pane" id="pane-principles">
  <div class="pg-title">會計原理原則</div>
  <div class="card">
    <div class="sec">分類篩選</div>
    <div class="cat-tabs" id="catTabs">
      <button class="cat-tab on" onclick="filterPrinciples('all',this)">全部</button>
      <button class="cat-tab" onclick="filterPrinciples('基本假設',this)">基本假設</button>
      <button class="cat-tab" onclick="filterPrinciples('一般原則',this)">一般原則</button>
      <button class="cat-tab" onclick="filterPrinciples('會計要素',this)">會計要素</button>
      <button class="cat-tab" onclick="filterPrinciples('稅務會計',this)">稅務會計</button>
      <button class="cat-tab" onclick="filterPrinciples('財務報表',this)">財務報表</button>
    </div>
    <div id="principleList"></div>
  </div>
</div>

<!-- 弱點分析 -->
<div class="pane" id="pane-weak">
  <div class="pg-title">弱點分析</div>
  <div class="card">
    <div class="sec">錯誤率排行</div>
    <div id="weakList"></div>
  </div>
  <div class="card">
    <div class="sec">錯字記憶（本次）</div>
    <div id="wrongLog" style="font-size:13px;color:var(--muted)">完成一輪打字後顯示</div>
  </div>
  <div class="card">
    <div class="sec">備考建議</div>
    <div id="weakSug" style="font-size:13px;line-height:1.8;color:var(--muted)"></div>
  </div>
</div>

</main>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════ 資料庫 ══════════

function setLang(lang,btn){
  ST.lang=lang;
  document.querySelectorAll('.lt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(lang==='en' && (ST.mode==='acc_zh'||ST.mode==='law_zh')) selModeStr('acc_en');
  else if(lang==='zh' && ST.mode!=='acc_zh'&&ST.mode!=='law_zh') selModeStr('acc_zh');
  else nextText();
}

function selModeStr(m){
  ST.mode=m;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  const map={law_en:'法條關鍵字',acc_en:'會計英文',tax_en:'稅法英文',star5_en:'★★★★★ 抽題',acc_zh:'會計中文',law_zh:'法條中文'};
  document.querySelectorAll('.pill').forEach(p=>{if(p.textContent===map[m])p.classList.add('on');});
  nextText();
}

function selMode(btn,mode){
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  if(mode==='custom'){
    const t=prompt('輸入練習文字（中英均可）：');
    if(t){ST.text=t.trim();ST.mode='custom';resetTy();}
    return;
  }
  ST.mode=mode;
  ST.lang=mode.endsWith('zh')?'zh':'en';
  document.getElementById('ltEN').classList.toggle('on',ST.lang==='en');
  document.getElementById('ltZH').classList.toggle('on',ST.lang==='zh');
  nextText();
}

function nextText(){
  const pool=TEXTS[ST.mode]||TEXTS.law_en;
  ST.text=pool[Math.floor(Math.random()*pool.length)];
  resetTy();
}

function resetTy(){
  ST.typed='';ST.startT=null;ST.done=false;ST.wrongCh={};
  const inp=document.getElementById('tyIn');
  inp.value='';inp.disabled=false;
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('stProg').textContent='0/'+(ST.text.length||0);
  document.getElementById('stWpm').textContent='0';
  document.getElementById('stAcc').textContent='100';
  renderTy('');
  if(ST.timerOn){clearInterval(ST.timerInt);ST.timerSec=60;updTimer();}
}

function renderTy(typed){
  let h='';
  for(let i=0;i<ST.text.length;i++){
    const ch=ST.text[i]===' '?'&nbsp;':ST.text[i];
    if(i<typed.length) h+=typed[i]===ST.text[i]?`<span class="cc">${ch}</span>`:`<span class="cw">${ch}</span>`;
    else if(i===typed.length) h+=`<span class="cur">${ch}</span>`;
    else h+=`<span class="cp">${ch}</span>`;
  }
  document.getElementById('tyDisp').innerHTML=h;
}

function onInput(){
  const v=document.getElementById('tyIn').value;
  ST.typed=v;
  if(!ST.startT&&v.length>0){ST.startT=Date.now();if(ST.timerOn)startTimer();}
  if(ST.done)return;
  renderTy(v);
  const el=Math.max((Date.now()-ST.startT)/6e4,.0001);
  const wpm=Math.round(v.trim().split(/\s+/).filter(Boolean).length/el);
  let ok=0;
  for(let i=0;i<v.length;i++){if(v[i]===ST.text[i])ok++;else ST.wrongCh[ST.text[i]]=(ST.wrongCh[ST.text[i]]||0)+1;}
  const acc=v.length?Math.round(ok/v.length*100):100;
  document.getElementById('stWpm').textContent=wpm;
  document.getElementById('stAcc').textContent=acc;
  document.getElementById('stProg').textContent=v.length+'/'+ST.text.length;
  if(v.length>=ST.text.length){ST.done=true;document.getElementById('tyIn').disabled=true;if(ST.timerOn)clearInterval(ST.timerInt);finishTy(wpm,acc);}
}

function finishTy(wpm,acc){
  if(wpm>ST.bestWpm){ST.bestWpm=wpm;localStorage.setItem('fs_wpm',wpm);document.getElementById('d-wpm').textContent=wpm;toast('🎉 新紀錄 '+wpm+' WPM！');}
  ST.wpmH.push(wpm);if(ST.wpmH.length>20)ST.wpmH.shift();localStorage.setItem('fs_wpmh',JSON.stringify(ST.wpmH));
  ST.todayR++;localStorage.setItem('fs_today',ST.todayR);
  const tot=parseInt(localStorage.getItem('fs_total')||'0')+1;localStorage.setItem('fs_total',tot);
  document.getElementById('d-today').textContent=ST.todayR;
  document.getElementById('rWpm').textContent=wpm+' WPM';
  document.getElementById('rAcc').textContent='準確率 '+acc+'%'+(acc>=95?' ✦ 優秀':acc>=85?' ✦ 良好':'');
  document.getElementById('rBest').textContent=ST.bestWpm+' WPM';
  document.getElementById('resultBox').classList.add('show');
  const wk=Object.entries(ST.wrongCh).sort((a,b)=>b[1]-a[1]).slice(0,6);
  if(wk.length)document.getElementById('wrongLog').innerHTML='本次最常打錯：'+wk.map(([k,v])=>`<span class="tag">${k}×${v}</span>`).join(' ');
}

function onKD(e){if(e.key==='Enter'&&ST.done){e.preventDefault();nextText();}}

function toggleTimer(){
  ST.timerOn=!ST.timerOn;
  const btn=document.getElementById('timerBtn');
  btn.textContent=ST.timerOn?'計時中':'計時模式';
  btn.className=ST.timerOn?'btn btn-rose btn-sm':'btn btn-sm';
  if(!ST.timerOn){clearInterval(ST.timerInt);ST.timerSec=60;updTimer();}
  toast(ST.timerOn?'60秒衝刺！開始打字計時自動啟動':'已關閉計時模式');
}

function startTimer(){
  clearInterval(ST.timerInt);ST.timerSec=60;
  ST.timerInt=setInterval(()=>{
    ST.timerSec--;updTimer();
    if(ST.timerSec<=0){
      clearInterval(ST.timerInt);
      document.getElementById('tyIn').disabled=true;ST.done=true;toast('⏱ 時間到！');
      const wpm=parseInt(document.getElementById('stWpm').textContent)||0;
      const acc=parseInt(document.getElementById('stAcc').textContent)||100;
      finishTy(wpm,acc);
    }
  },1000);
}

function updTimer(){
  document.getElementById('timerNum').textContent=ST.timerSec;
  document.getElementById('timerNum').className='timer-num'+(ST.timerSec<=10?' hot':'');
  document.getElementById('timerArc').style.strokeDashoffset=75*(1-ST.timerSec/60);
  document.getElementById('timerArc').style.stroke=ST.timerSec<=10?'var(--rose-m)':'var(--blue-m)';
}

function buildArtList(){
  document.getElementById('artList').innerHTML=ARTICLES.map((a,i)=>`
    <div class="ac" id="ac${i}" onclick="pickArt(${i})">
      <div class="ac-no">${a.no} · ${a.law}</div>
      <div class="ac-ti">${a.ti} <span class="stars">${'★'.repeat(a.s)}</span></div>
      <div class="ac-en">${ST.lang==='zh'?a.zh:a.en}</div>
    </div>`).join('');
}

function pickArt(i){
  document.querySelectorAll('.ac').forEach(c=>c.classList.remove('sel'));
  const el=document.getElementById('ac'+i);if(el)el.classList.add('sel');
  const a=ARTICLES[i];
  ST.text=(ST.lang==='zh'?a.zh:a.en)+' ('+a.no+' '+a.law+')';
  resetTy();
}

function init(){
  renderDash();buildArtList();nextText();renderPrinciples('all');renderWeak();
}
init();
</script>
